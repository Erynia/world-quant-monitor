<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高级配置 - WorldQuant 策略工具</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#f1f5f9; color:#0f172a; }
    .topbar { background: linear-gradient(90deg, #4f46e5, #7c3aed); color:#fff; padding:14px 20px; display:flex; justify-content:space-between; align-items:center; }
    .topbar a { color:#e0e7ff; text-decoration:none; margin-left:12px; }
    .topbar a:hover { text-decoration:underline; }
    .container { max-width:560px; margin:20px auto; padding:0 14px; }
    .panel { background:#fff; border-radius:12px; box-shadow:0 4px 18px rgba(0,0,0,.06); padding:20px; }
    .panel h2 { margin-top:0; margin-bottom:16px; }
    input, button { padding:8px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; }
    input { width: 100%; box-sizing: border-box; }
    button { cursor:pointer; }
    button:disabled { cursor:not-allowed; opacity:.6; }
    .form-grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px; }
    .field label { display:block; font-size:12px; color:#475569; margin-bottom:4px; }
    .field small { display:block; font-size:11px; color:#94a3b8; margin-top:3px; line-height:1.3; }
    .tips { background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:10px; font-size:12px; color:#334155; line-height:1.6; margin-bottom:12px; }
    .tips.hint { background:#eff6ff; border-color:#93c5fd; margin-top:16px; }
    .btn-row { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
    .toast-wrap { position: fixed; right: 16px; top: 16px; display:flex; flex-direction:column; gap:8px; z-index: 1000; }
    .toast { color:#fff; padding:10px 12px; border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.18); min-width:220px; }
    .toast.ok { background:#16a34a; }
    .toast.err { background:#dc2626; }
    .toast.info { background:#2563eb; }
  </style>
</head>
<body>
  <div id="toasts" class="toast-wrap"></div>
  <div class="topbar">
    <div>高级配置</div>
    <div>
      <a href="{{ url_for('index') }}">返回首页</a>
      <a href="{{ url_for('logout') }}">退出登录</a>
    </div>
  </div>

  <div class="container">
    <div class="panel">
      <h2>高级参数</h2>
      <div class="tips">
        以下参数在启动「一阶段 / 二阶段 / 三阶段」挖掘任务时生效，保存后会在首页启动任务时自动使用。
        这些参数用于控制策略挖掘和筛选的阈值，可以根据您的需求进行调整。
      </div>
      <div class="form-grid">
        <div class="field">
          <label for="decay">decay（1 阶段）</label>
          <input id="decay" value="5">
          <small>一阶段 decay，默认 5</small>
        </div>
        <div class="field">
          <label for="sharpe2">sharpe_th_step2</label>
          <input id="sharpe2" value="0.75">
          <small>二阶段 sharpe 阈值</small>
        </div>
        <div class="field">
          <label for="fitness2">fitness_th_step2</label>
          <input id="fitness2" value="0.5">
          <small>二阶段 fitness 阈值</small>
        </div>
        <div class="field">
          <label for="long2">longCount_th_step2</label>
          <input id="long2" value="100">
          <small>二阶段 longCount 阈值</small>
        </div>
        <div class="field">
          <label for="short2">shortCount_th_step2</label>
          <input id="short2" value="100">
          <small>二阶段 shortCount 阈值</small>
        </div>
        <div class="field">
          <label for="sharpe3">sharpe_th_step3</label>
          <input id="sharpe3" value="1.0">
          <small>三阶段 sharpe 阈值</small>
        </div>
        <div class="field">
          <label for="fitness3">fitness_th_step3</label>
          <input id="fitness3" value="0.75">
          <small>三阶段 fitness 阈值</small>
        </div>
        <div class="field">
          <label for="long3">longCount_th_step3</label>
          <input id="long3" value="100">
          <small>三阶段 longCount 阈值</small>
        </div>
        <div class="field">
          <label for="short3">shortCount_th_step3</label>
          <input id="short3" value="100">
          <small>三阶段 shortCount 阈值</small>
        </div>
      </div>
      <div class="btn-row">
        <button id="saveAdvCfgBtn">保存到本地</button>
        <button id="loadAdvCfgBtn">从本地读取</button>
      </div>
      <div id="currentParamsHint" class="tips hint">
        <strong>当前配置预览（保存后将在首页启动任务时生效）：</strong><br>
        <span id="currentParamsText">—</span>
      </div>
    </div>
  </div>

  <script>
    const ADV_CFG_KEY = "alpha_adv_config_v1";

    function showToast(message, kind = "info", timeout = 2200) {
      const wrap = document.getElementById("toasts");
      const div = document.createElement("div");
      div.className = `toast ${kind}`;
      div.textContent = message;
      wrap.appendChild(div);
      setTimeout(() => div.remove(), timeout);
    }

    function getAdvancedConfig() {
      return {
        decay: document.getElementById("decay").value,
        sharpe_th_step2: document.getElementById("sharpe2").value,
        fitness_th_step2: document.getElementById("fitness2").value,
        longCount_th_step2: document.getElementById("long2").value,
        shortCount_th_step2: document.getElementById("short2").value,
        sharpe_th_step3: document.getElementById("sharpe3").value,
        fitness_th_step3: document.getElementById("fitness3").value,
        longCount_th_step3: document.getElementById("long3").value,
        shortCount_th_step3: document.getElementById("short3").value,
      };
    }

    function applyAdvancedConfig(cfg) {
      if (!cfg) return;
      if (cfg.decay != null) document.getElementById("decay").value = cfg.decay;
      if (cfg.sharpe_th_step2 != null) document.getElementById("sharpe2").value = cfg.sharpe_th_step2;
      if (cfg.fitness_th_step2 != null) document.getElementById("fitness2").value = cfg.fitness_th_step2;
      if (cfg.longCount_th_step2 != null) document.getElementById("long2").value = cfg.longCount_th_step2;
      if (cfg.shortCount_th_step2 != null) document.getElementById("short2").value = cfg.shortCount_th_step2;
      if (cfg.sharpe_th_step3 != null) document.getElementById("sharpe3").value = cfg.sharpe_th_step3;
      if (cfg.fitness_th_step3 != null) document.getElementById("fitness3").value = cfg.fitness_th_step3;
      if (cfg.longCount_th_step3 != null) document.getElementById("long3").value = cfg.longCount_th_step3;
      if (cfg.shortCount_th_step3 != null) document.getElementById("short3").value = cfg.shortCount_th_step3;
      updateHint();
    }

    function encodeAdv(cfg) {
      try {
        return btoa(unescape(encodeURIComponent(JSON.stringify(cfg))));
      } catch {
        return "";
      }
    }

    function decodeAdv(raw) {
      try {
        return JSON.parse(decodeURIComponent(escape(atob(raw))));
      } catch {
        return null;
      }
    }

    function updateHint() {
      const adv = getAdvancedConfig();
      const parts = [
        "一阶段 decay=" + adv.decay,
        "二阶段 sharpe=" + adv.sharpe_th_step2 + " fitness=" + adv.fitness_th_step2 + " long=" + adv.longCount_th_step2 + " short=" + adv.shortCount_th_step2,
        "三阶段 sharpe=" + adv.sharpe_th_step3 + " fitness=" + adv.fitness_th_step3 + " long=" + adv.longCount_th_step3 + " short=" + adv.shortCount_th_step3,
      ];
      document.getElementById("currentParamsText").textContent = parts.join("；");
    }

    document.getElementById("saveAdvCfgBtn").onclick = () => {
      const cfg = getAdvancedConfig();
      const enc = encodeAdv(cfg);
      if (!enc) {
        showToast("保存失败", "err");
        return;
      }
      localStorage.setItem(ADV_CFG_KEY, enc);
      updateHint();
      showToast("已保存到本地", "ok");
    };

    document.getElementById("loadAdvCfgBtn").onclick = () => {
      const raw = localStorage.getItem(ADV_CFG_KEY);
      if (!raw) {
        showToast("暂无已保存的高级配置", "info");
        return;
      }
      const cfg = decodeAdv(raw);
      if (!cfg) {
        showToast("解析失败，请重新保存", "err");
        return;
      }
      applyAdvancedConfig(cfg);
      showToast("已从本地载入", "ok");
    };

    document.querySelectorAll("#decay,#sharpe2,#fitness2,#long2,#short2,#sharpe3,#fitness3,#long3,#short3").forEach(el => {
      el.addEventListener("input", updateHint);
      el.addEventListener("change", updateHint);
    });

    // 初次加载：若本地有保存则载入并更新预览
    (function init() {
      const raw = localStorage.getItem(ADV_CFG_KEY);
      if (raw) {
        const cfg = decodeAdv(raw);
        if (cfg) applyAdvancedConfig(cfg);
      }
      updateHint();
    })();
  </script>
</body>
</html>
